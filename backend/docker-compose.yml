version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: fleetspy_postgres
    environment:
      POSTGRES_DB: geofence_db
      POSTGRES_USER: niskuldeep
      POSTGRES_PASSWORD: niskuldeep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U niskuldeep -d geofence_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetspy_backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://niskuldeep:niskuldeep@postgres:5432/geofence_db
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
