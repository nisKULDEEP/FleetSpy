version: '1.0'

services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: geofence_postgres
    environment:
      POSTGRES_DB: geofence_db
      POSTGRES_USER: niskuldeep
      POSTGRES_PASSWORD: niskuldeep
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U niskuldeep -d geofence_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geofence_backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: geofence_db
      DB_USER: niskuldeep
      DB_PASSWORD: niskuldeep
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
